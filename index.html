<html>
<head>
    <title>BOX HUNT</title>
    <style>
        body{
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem;
            padding-top: 0px;
        }
        .container{
            position: relative;
            width: 50vw;
            max-height: auto;
            min-height: 100%;
            background-color: rgb(235, 235, 235);
            margin-bottom: 24px;
        }
        .container .actions-box{
            width: 100%;
            height: 48px;
            display: flex;
            justify-content: space-evenly;
            margin: 16px 0px;
        }
        .container .actions-box button{
            width: 100px;
            cursor: pointer;
            border: 1px solid rgb(202, 202, 202);
            border-radius: 8px;
        }

        .container .actions-box input{
            border: 1px solid rgb(197, 197, 197);
            border-radius: 8px;
        }
        #start{
            background-color: rgb(45, 200, 45);
        }
        #pause {
            background-color: rgb(216, 221, 64);
        }
        #reset {
            background-color: rgb(249, 124, 82);
        }

        .preview{
            width: 100%;
            height: auto;
            display: flex;
            justify-content: center;
            flex-direction: column;
        }

        .preview .grid{
            width: 100%;
            background: #e1e1e1;
            height: 280px;
            position: relative;
        }

        #box{
            width: 24px;
            height: 24px;
            background: red;
            position: absolute;
            top: 50%;
            left: 90%;
            cursor: pointer;
            display: none;
        }

        .output{
            position: relative;
            width: 100%;
            height: auto;
            display: flex;
            padding: 8px;
            justify-content: center;
            overflow-y: hidden;
        }
        table{
            position: relative;
            width: 80%;
        }
        table, th, td{
            border: 1px solid rgb(128, 128, 128);
            text-align: center;
        }

        #paushedText{
            opacity: 0.5;
            text-align: center;
            width: 100%;
            height: 100%;
            display: none;
        }

    </style>
</head>
<body>
    <h1>BOX HUNT</h1>
    <section class="container">
        <div class="actions-box">
            <button type="button" class="btn" id="start">Start</button>
            <button type="button" class="btn" id="pause" disabled onclick="pause();">Pause</button>
            <button type="button" class="btn" id="reset" disabled onclick="reset();">Reset</button>
            <input type="text" name="input-seconds" id="input_seconds" class="form-group" placeholder="Enter Seconds..">
        </div>
        <div class="preview">
            <div class="grid">
                <div class="box" id="box"></div>
                <p id="paushedText">GAME PAUSED</p>
            </div>
            <div class="output">
                <table>
                    <thead>
                        <th>Mouse Click Number</th>
                        <th>Reaction Time</th>
                    </thead>
                    <tbody id="targetBody">
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <script src="./script.js"></script>
</body>
</html>
